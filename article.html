<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Article – Life Snake Studio</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="article/css/article.css" />
</head>
<body>
  <div class="topbar">
    <img src="Resources/Logos/TopBarLogo.png" alt="Life Snake Studio" class="topbar-logo menu-btn" id="menuTrigger" />
    <div class="title" id="siteTitle" style="display:none;">LIFE SNAKE STUDIO</div>
    <div class="lang-switcher">
      <select id="langSelect"></select>
    </div>
  </div>

  <div class="side-menu" id="menu">
    <div id="menuLinks"></div>
    <div class="menu-version">v0.2.0</div>
  </div>
  <div class="overlay" id="overlay"></div>

  <div class="article-layout">
    <div class="article-sidebar" id="articleSidebar">
      <!-- cards injected here -->
    </div>
    <div class="article-detail" id="articleDetail">
      <h1 id="detailTitle"></h1>
      <div id="detailBody"></div>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/state.js"></script>
  <script src="js/data.js"></script>
  <script src="js/dom.js"></script>
  <script src="article/js/article.js"></script>
</body>
</html>
