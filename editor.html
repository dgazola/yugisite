<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Editor – Life Snake Studio</title>
  <link rel="stylesheet" href="editor/css/editor.css" />
</head>
<body>
  <div class="editor-container">
    <header class="editor-header">
      <h1>🃏 Content Editor</h1>
      <div class="editor-actions">
        <button id="saveBtn" class="btn btn-primary">💾 Save</button>
        <button id="revertBtn" class="btn btn-secondary">↺ Revert</button>
        <a href="index.html" class="btn btn-ghost">← Back to Site</a>
      </div>
    </header>

    <div class="editor-workspace">
      <aside class="editor-sidebar">
        <div class="main-tabs" id="mainTabs">
          <button class="tab main-tab active" data-tab="cards">Cards</button>
          <button class="tab main-tab" data-tab="menu">Menu</button>
          <button class="tab main-tab" data-tab="languages">Languages</button>
          <button class="tab main-tab" data-tab="blog">Blog</button>
          <button class="tab main-tab" data-tab="devlog">Devlog</button>
        </div>

        <!-- Cards panel -->
        <div class="panel" id="panelCards">
          <div class="column-tabs" id="columnTabs">
            <button class="tab col-tab active" data-column="main">Main</button>
            <button class="tab col-tab" data-column="devlog">Devlog</button>
            <button class="tab col-tab" data-column="blog">Blog</button>
          </div>
          <div class="landing-card-section">
            <h3>Landing Card</h3>
            <select id="landingCardSelect">
              <option value="">— None —</option>
            </select>
            <p class="help-text">First card shown when the site loads.</p>
          </div>
          <button id="addCardBtn" class="btn btn-primary">+ Add Card</button>
        </div>

        <!-- Menu panel -->
        <div class="panel" id="panelMenu" style="display:none;">
          <h3>Menu Items</h3>
          <p class="help-text">Use up/down buttons to reorder.</p>
          <div id="menuList"></div>
          <button id="addMenuItemBtn" class="btn btn-primary">+ Add Menu Item</button>
        </div>

        <!-- Languages panel -->
        <div class="panel" id="panelLanguages" style="display:none;">
          <h3>Languages</h3>
          <div id="langList"></div>
          <hr>
          <div class="add-language">
            <input type="text" id="newLangCode" placeholder="e.g. es, fr" maxlength="5" />
            <button id="addLanguageBtn" class="btn btn-primary">Add Language</button>
          </div>
        </div>

        <!-- Blog panel -->
        <div class="panel" id="panelBlog" style="display:none;">
          <h3>Blog Entries</h3>
          <p class="help-text">Edit blog posts (dummy for now).</p>
          <div id="blogList"></div>
          <button id="addBlogBtn" class="btn btn-primary">+ Add Blog Entry</button>
        </div>

        <!-- Devlog panel -->
        <div class="panel" id="panelDevlog" style="display:none;">
          <h3>Devlog Entries</h3>
          <p class="help-text">Edit devlog posts (dummy for now).</p>
          <div id="devlogList"></div>
          <button id="addDevlogBtn" class="btn btn-primary">+ Add Devlog Entry</button>
        </div>
      </aside>

      <main class="editor-main">
        <div class="lang-tabs" id="langTabs"></div>
        <div id="cardList" class="card-list"></div>
        <div id="menuEditArea" class="card-list" style="display:none;"></div>
        <div id="blogEditArea" class="card-list" style="display:none;"></div>
        <div id="devlogEditArea" class="card-list" style="display:none;"></div>
      </main>
    </div>
  </div>

  <script src="editor/js/editor.js"></script>
</body>
</html>
