<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Editor – Life Snake Studio</title>
  <link rel="stylesheet" href="editor/css/editor.css" />
</head>
<body>
  <div class="editor-container">
    <header class="editor-header">
      <h1>🃏 Card Editor</h1>
      <div class="editor-actions">
        <button id="saveBtn" class="btn btn-primary">💾 Save</button>
        <button id="revertBtn" class="btn btn-secondary">↩ Revert</button>
        <a href="index.html" class="btn btn-ghost">← Back to Site</a>
      </div>
    </header>

    <div class="editor-workspace">
      <aside class="editor-sidebar">
        <div class="main-tabs" id="mainTabs">
          <button class="tab main-tab active" data-tab="cards">Cards</button>
          <button class="tab main-tab" data-tab="articles">Articles</button>
          <button class="tab main-tab" data-tab="languages">Languages</button>
        </div>

        <div class="panel" id="panelCards">
          <div class="landing-card-section">
            <h3>Landing Card</h3>
            <select id="landingCardSelect">
              <option value="">— None —</option>
            </select>
          </div>
          <button id="addCardBtn" class="btn btn-primary">+ Add Main Card</button>
        </div>

        <div class="panel" id="panelArticles" style="display:none;">
          <div class="sub-tabs" id="articleSubTabs">
            <button class="tab sub-tab active" data-article="blog">Blog</button>
            <button class="tab sub-tab" data-article="devlog">Devlog</button>
          </div>
          <div class="landing-card-section" style="margin-top:10px;">
            <p class="help-text" style="margin-top:0;">Check "Highlighted" to show on main page.</p>
          </div>
          <button id="addArticleBtn" class="btn btn-primary">+ Add Article</button>
        </div>

        <div class="panel" id="panelLanguages" style="display:none;">
          <h3>Languages</h3>
          <div id="langList"></div>
          <hr>
          <div class="add-language">
            <input type="text" id="newLangCode" placeholder="e.g. es, fr" maxlength="5" />
            <button id="addLanguageBtn" class="btn btn-primary">Add Language</button>
          </div>
        </div>
      </aside>

      <main class="editor-main">
        <div id="cardList" class="card-list"></div>
        <div id="articleList" class="card-list" style="display:none;"></div>
      </main>
    </div>
  </div>

  <script src="editor/js/state.js"></script>
  <script src="editor/js/helpers.js"></script>
  <script src="editor/js/ui-tabs.js"></script>
  <script src="editor/js/ui-cards.js"></script>
  <script src="editor/js/ui-articles.js"></script>
  <script src="editor/js/ui-languages.js"></script>
  <script src="editor/js/load-save.js"></script>
  <script src="editor/js/auto-load.js"></script>
  <script src="editor/js/editor.js"></script>
</body>
</html>
